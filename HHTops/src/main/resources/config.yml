# Основные параметры обновления топов
update-interval-seconds: 300

# Количество отображаемых мест в каждом топе
top-size: 10

# Расстояние между строками голограммы
line-spacing: 0.28

# Сообщения плагина
messages:
  no-permission: "&cУ вас нет прав на использование этой команды."
  only-player: "&cЭту команду может использовать только игрок."
  usage: "&eИспользование: /hhtops movehere <kills|deaths|time|money>"
  unknown-category: "&cНеизвестная категория. Доступно: kills, deaths, time, money."
  moved: "&aГолограмма категории &e{category} &aперемещена на ваши координаты."

# Настройки оформления и координат голограмм
holograms:
  kills:
    title:
      - "&6&lТоп по убийствам"
      - "&7Лучшие бойцы сервера"
    line-format: "&e{place}. &f{player} &7- &c{value}"
    empty-format: "&e{place}. &7Нет данных"
    location:
      world: "world"
      x: 0.5
      y: 80.0
      z: 0.5

  deaths:
    title:
      - "&6&lТоп по смертям"
      - "&7Самые невезучие игроки"
    line-format: "&e{place}. &f{player} &7- &c{value}"
    empty-format: "&e{place}. &7Нет данных"
    location:
      world: "world"
      x: 3.5
      y: 80.0
      z: 0.5

  time:
    title:
      - "&6&lТоп по времени в игре"
      - "&7Самые активные игроки"
    line-format: "&e{place}. &f{player} &7- &b{value}"
    empty-format: "&e{place}. &7Нет данных"
    location:
      world: "world"
      x: 6.5
      y: 80.0
      z: 0.5

  money:
    title:
      - "&6&lТоп по деньгам"
      - "&7Самые богатые игроки"
    line-format: "&e{place}. &f{player} &7- &a{value}"
    empty-format: "&e{place}. &7Нет данных"
    location:
      world: "world"
      x: 9.5
      y: 80.0
      z: 0.5
